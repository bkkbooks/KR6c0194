body:
  text: 說無眼界乃至無意識界者本來無形若眼界淨意識安因執有眼連纍十八界不安但去眼根反究虗假古德云眼是障道魔軍著境自迷回路仙真云眼觀心動著物迷真吾身非久六根皆歸敗壞靜審四大都無實義惟有真空妙性長劫不壞之體湛然常在亦無修證釋氏云那伽長在定無有不定持先師云定中境界靜裏乾坤自然而然做作又不是也既得定力有甚散亂如同秋月圓陀陀光爍爍普天匝地無有不照著處說箇照著亦是自然非妄想故拾得又云吾心不比月比月有圓缺一盞無油燈照得十方徹山河大地不能隔礙光明洞耀逈脫根塵體露真常本無染污但離諸緣便是仙佛無眼界乃至空無意識界從本來曠大劫盤古至今又無眼又無耳難猫難𦘕鼻舌萬般音聲身意難量難測無形相能變化廣有神通這真身與世間無有比對不是佛不是人非是衆生男女不是凡聖古今非相非空這妙意人人有終日顯現渾身上細搜尋不見其踪暗思想心內喜多虧師傅慈悲心教道我才得分明請心經說一遍言言見諦談妙法論無極句句超宗精裸裸赤剎剎光明出現生不死不愁不壞金身無無明者萬緣不生也無明是黑暗不停之念一切衆生盡有無明因有無明起多種差別百般煩惱皆是暗昧之心故令如是道云暗昧心不止地獄畜生本釋云無明不見菩提路不覺將身落火坑儒云寸心不昧萬法皆明又廣成子云木去火則不灰人去情則不死太顛云心處六情如鳥投網造罪惡業如蛾赴燈出殼入殼轉轉不覺流浪經劫皆因無明而起因有無明有行因行有識因識有名色因名色有六入因六入有觸因觸有受因受有愛因愛有取因取有有因有有生因生有老死憂悲苦惱皆因無明為始於此親見無明降伏令死死中更死諸漏自盡煩惱永斷三毒自滅惡根自除直截根源莫顧枝梢根若截斷枝葉自枯不見有身身盡無明盡塵垢亦盡萬劫塵沙數罪一時頓息輪回生死一時消滅無無明心豁亮才知下落兼落歸根才知端的道理分明不圖修福不求皇宮不求來世不圖轉生有身有苦不求人身不圖有相清淨法身無無明認的他西方大路無相家風愛的是極樂世界立命安身亦無無明盡者潔白之意道理精通迷則顛倒妄想是無明業心悟則轉凡成聖是圓明覺性都是一般心地只爭明與不明太上云同出而異名永嘉云無明實性即佛性幻化空身即法身若執幻身是我即有無明有無明即生三毒起三惡業三業昏暗六根內盲因此不覺不知背覺合塵墮三惡道如有智慧之人能轉慳貪心為喜捨心轉嗔怒心為歡喜心轉愚癡執著心為圓融脫灑心更改六賊為六神通於此一二轉得改得自然轉凡成聖凡夫即是聖人若轉不過改不得聖人即是凡夫如何凡人被物轉聖人能轉物百姓日用而不知終日忙忙被物所引日久月深離家漸遠不得還鄉迷真失本也若是會萬物歸於自己豈得迷失真本也川老云終日忙忙那事無妨不求解脫不樂天堂但能一念歸無念高步毗盧頂上行道云居塵不染塵在欲而無欲身心如如內外無餘須是打成一片與空劫齊形影不存反觀己身我身不實餘者皆空我身尚假有甚無明無無明盡萬物絶鐵面無情不須說玄妙之法風不透無為道理甚嚴切無智衆生空磨亂廣攬雜念不如拙看經不解如來意口念心違意不徹妄想牽連過一生摘葉尋枝無休歇敬奉尊師守根源頓除疑心真了潔瞥然如是知端的佛祖都是這等說肯把心經信一句彈指明白超三界乃至無老死者修行之人須要妄形忘體我身既無有何無明無明既無生死亦斷太上云內觀其心心無其心外觀其形形無其形遠觀其物物無其物三者既悟惟見於空金剛經云無我相無人相無衆生相無壽者相三者既無四相皆空有何無明老死萬法自空即是仙佛只這仙佛兩字也是多了亦乃強名且衆生顛倒被目前幻境所惑習性所牽形影變動不能作主隨物流轉因執有我妄心不滅人我不除執著聲色墮落生死若是見性之人目前無法亦無衆生心佛及衆生三無差別平等真法界一體同觀萬法歸一且怎的同觀為一仙真云雖則枝分稍異根本無殊派別流差百川還海且太極未判混然一氣豈有二耶天地既分而有高下一生二二生三三生萬物皆一氣所化天也是道地也是道人也是道有情無情皆受道氣所生觀稍末則萬彚不等知根本則一概無殊仙真云平等不二者是全真之丈夫若識破這箇道理生則從他生老則從他老病則從他病死則從他死生老病死不曾干礙著我漚生漚滅波翻浪滾水本常然太顛云到家底人不見有生死亦無生滅天堂地獄六道四生一切幻化於徹底的人總無交涉自然全身放下古云諸行無常一切空即是如來大圓覺乃至無老死也無無始以來在閻浮未曾初分先有性性是如來無量壽成住壞空經多少天地循環不計數空裏現形形有壞空是無極空堅固未有天地空在前空生陰陽空是母迷人不解元流義可嘆學徒心性粗口大舌長誇能會欺師慢文殺佛祖破邪顯正不納受連泥帶水非丈夫乃至無老壽延長不生不滅似神仙時節到來因緣至返妄歸真入本源多虧祖師真妙法說破前因出苦淪我今得道安身處心心念念不忘恩亦無老死盡者既無老死常劫如然豈有窮盡有盡是色身無老死是真空法相既不著有亦不滯空活潑潑的轉轆轆的圓陀陀的光爍爍的豈有盡耶修行人先要打當乾淨才有相應處太上云損之又損之以至於無為無為而不為大顛云學道之人如剝芭蕉一般去一層又去一層直至去盡無下手處自然返本還元得五蘊空如未生相似燒了一般到空不空處脫體全忘不存踪跡要通身手眼不立纖塵名字何況他十二因緣六度萬行頭陀苦行一時頓脫如枯木死灰如百無一會的人古云不是洗心除妄想都緣無事可思量若更說生說死說因說果說心說性則被法縛也永嘉云心是根法是塵兩種猶如鏡上痕痕垢盡除光始現心法雙忘涅槃城亦無老死盡凡情曠劫常然豈有窮四面八方無障礙一體同觀有甚競法身普覆大千界恆沙諸佛混源中三世如來都在道本性相連太虗空各人了得心間事千燈一室光不分念報明師難酬謝不落分別報祖恩到岸從來不用船坦然大道透常安了知元不因他悟面目分明總一般前又三來後又三擬議商量總不堪饒汝識情俱絶斷三生九劫更重參一段生涯六不收從前萬法盡非儔輕輕擘破三千界直得恆河水逆流無苦集滅道者既忘其形即得生死斷絶更無窮盡有甚苦集滅道先師云因有身心招衆苦能忘身心苦何生釋云身是衆苦之本心是惡業之根若能放下身心便登菩提彼岸大顛云小乘之人日夜精進六度萬行心外求法免此四諦出世界免輪回無有是處諸佛為大事因緣出現於世不以小乘法濟度於衆生大乘之者學無為法端坐念實相衆罪如霜露慧日能消除存於間處收攝其心端坐不動觀一切法皆無所有反觀四大有身非覺體無相乃明真自知空寂頓觀淨盡無功之功長劫不壞無為之為而不為如如不動湛然常寂蓮經云諸法從本來常自寂滅相佛子行道已來世得作佛定慧力莊嚴無迷無悟無苦無樂無寂無滅無道無得無慧無失本來無一物明鏡亦非臺到這裏修證即無染污不得一超直入如來地要見如來麼如來似來不來似去不去送之即不得留之亦不住無苦寂滅道路窮無福無罪脫凡籠既忘其形生死斷得了金剛不壞身因有身心招衆苦能忘身心苦何生不求人身生死斷不求成佛脫凡籠神仙菩薩羅漢果位放下貪心登彼岸背塵合覺道才真不住相法超生死返妄歸真道圓成小乘不肯修功德嫌貧愛富大妄心修下來生無量福倚富欺貧集業根閻王惱怒佛不喜那里安剎這樣人若想脫免輪回苦驢長肌角甕生根無智亦無得者自身尚假豈有得乎道云實無所得為化衆生名為得道釋云亦無人亦無佛大千沙界水中漚一切聖賢如電拂又云不是心不是佛不是物大顛云到這般田地如賊人空室無物得偷道經云離種種邊名為妙道釋云自性清淨實無一法可當情本來付有法付了然無法箇箇心自悟悟了無無法無得無失無進無修胸次才有絲毫有得有失我能我會我悟我答我聰明我智慧盡是增上慢人我不除皆墮生死若是真實道人總不如是自有出身之路且道如何是出身之路打教四邊淨自好向前行本來這箇沒纖塵只怕時人錯認真放下了然無一物何處不是舊家風武陵春無智人不能得出身之計忙一生亂一世還入幽冥無智人每日家只會作惡無常到生死至走路無門害生靈又怕他殺鬼追命不信佛不信法可想念經無智人常念佛不知下落到臨危無投奔那里安身無智人會誦經不明佛義趂強心不參師空過一生無智人倚相修不辨真假到臨危靠不著勞而無功無智人不念善競名奪利瞞心地欺天理罪業隨身無智人吃迷齊不肯參道佛不喜神祗怒無處逃生今世因來生緣還遇佛會種善根遇正法亦得起生顧兒女置家緣別人情受作下業去受苦那箇知恩以無所得故者得無所得一體空虗修行人到這裡入大乘之位衆生因甚輪轉不能休息因不曾見性鮮無智慧不能廣悟無量空義執著自己胸次學解誤却本心大顛云從外入者不是家珍仙真云學他心內言終是別人語衆生被乾慧學解廣覽積習在心遂成我慢古云若有絲毫便是塵塵若不消只知傳說事塵若消盡諸境親見諸事親知如明眼人登高山無所不見修行人須是究竟到空劫齊不落第二見歸根得旨方有相應若是執著人我便生輕易善心比丘講得維摩經增上慢人我不除生陷地獄雲光法師講得天華亂墮貪嗔不改墮落堰牛若要超佛越祖須是念念空寂世間幻化一切客塵惟太虗之體聲色不存纖塵不立如虗空相似便是了事清淨安樂道人一無所得故不能不肯學好作惡人光陰有限能幾目忽的無常入幽冥萬貫家財將不去親戚六眷不見踪朋友弟兄難顧盻妻妾兒女也是空無常殺鬼來追命千頭馬面不放鬆入的陰司森羅殿閻王惱怒氣冲冲來來往往饒你命放回陽間去修行教你為人還不善佛言只當耳邊風棄恩背德休怨我送在阿鼻你受用石消芥盡無粒三災已了才翻身菩提薩埵者西天梵語也東土翻為人空法空大顛云了得人空名曰菩提了得法空名曰薩埵人法俱空名曰妙覺若四果小乘著相修行精進苦行及至修無漏斷塵沙惑果行圓滿得四果阿羅漢如獐獨跳神通狹劣墮在聲聞辟支佛裏不能接物利生若不見性不得到圓頓之位須是見性若得見性反掌之間轉凡成聖自然機緣悟佛三昧知大道根源雖無師智自然智多種種方便度諸迷悟同登彼岸更不受生教外別傳入圓頓無礙法門且道如何是無礙法門緬平一等七通八達菩提薩埵人法空無修無證得現成圓覺菩薩來作證豈有五派及三宗菩提薩埵一物無每日坦然觜嚧嘟試觀十五三更月衆星朗朗一月孤菩提薩埵空不空破邪顯證放光明微塵世界不能比難描難𦘕本來人菩提薩埵人法沒太極以前一物無無極變化生二儀五行分開大極圖菩提薩埵亦是空識得根源莫順情丈夫自有衝天智不向如來行處行虗空不增又不減不增不減是吾身萬物不占虗空性性空不占世間塵依般若波羅蜜多故者此中間六箇字依前種種解說修行得大智慧既有智慧必登彼岸而復太虗最尊最勝悟性般若天上天下無有及之道云十日有為不如一日無為又云一年學教不如一日通道古德云千日學法不如一日學般若大顛云般若通透大光明藏如人入海轉入轉深聞佛知見悟佛知見有大神通變化多般方便應現種種相隨機利物不落第二一體同觀平等真法界無衆生可度亦無佛可做理會得麼水流異派到海同源般若波羅蜜多圓久病眼之當時安多虧明師真法語身輕體快心地寬遇佛三昧明理性聞佛三昧識根源悟佛三昧有功德無為三昧得自然道德無為無不為無為之理總一般衆生有分及有緣失家纍劫今得還深悟無極先天性輕輕跳出死生關般若現前無罣礙橫身宇宙莫疑猜虗空拶破難藏復大道分明歸去來無來無去亦無形出入錯認定盤星好箇自在真空法返本還源舊家風心無罣礙者即悟真空妙理廓徹太虗清淨本然常得自在仙真云心若太虗不染一物釋云心同虗空界爾等虗空法證得虗空時無是無非法既然與虗空混為一體有何差別是與不是內外清淨內空外空當體即空未有天地先有此空太上云有物混成先天地生又云無名天地之始有名萬物之母視之不見聽之不聞搏之不得迎之不見其首隨之不見其後五目不都其蹤二聽絶聞其響川老云堂堂大道赫赫分明人人本具箇箇圓成只因差一念現出萬般形六祖云我有一物上拄天下拄地無人識得若親見一面超過諸佛祖出三界不墮輪回為人自肯自信得無礙法決定無礙會得麼扯碎幔天網去了當道石以是無遮擋今日才出期心無罣礙了妄緣識破紅塵不相干觀盡一切無情分恩愛斷時得自然知因不求西方境淨土元是無相天十方都是佛行處清淨法身廣無邊視之不見無形相聽之不聞空無言迎之不見為玄妙其首隨之可現前堂堂大道常覩面赫赫分明照大千我今得了無極道多虧明師送過關得了安身處得見無生母認得娘生面無罣礙故者內外清淨諸緣脫灑也如麗天杲日光滿大千無所不照一切虗妄境界總無罣礙東去無窮西去無極縱橫自在幻境不能所拘本源自性天真長劫不壞之體無去無來無變無異霧開日自現塵盡鏡自明故之一字是圓滿之義極則亦是真常之理不可言說因說不得故曰故金剛經云無法可說是名說法儒云道本無言開口失理仙師云道本難說須當自悟一撞金鐘響高樓送鼓聲驚醒夢中人本來空沒礙著相自家迷若人回得轉仙佛一般齊無罣礙性是空焉能有此寂滅教難得惺多有不通用意參細觀察須要到底知輕重辨黑白自然分明不思今不思古心無罣礙人佛晝夜安寧凡聖心法相晝善惡心修證晝成壞心好反晝戒律心有無晝這些事本來無不可執住把萬法放的下自在縱橫無有恐怖者既心無罣礙真常自然圓滿更有甚麼恐怖之心若到此地悟得性空東西不辨南北不分不被明暗所瞞不被坊隅所當不被陰陽所拘不被造化所役似此有甚憂苦可怕有甚生死可怖不與萬法為伴常自獨行獨步上天仰之無窮入地去之無極山河石壁地水火風於此往來總無罣礙側掌行千里回程轉似飛天地莫能拘神鬼莫能測喚作大覺金仙何者是不須覔火把燈尋渴飲飢餐常對面無有恐怖心豁亮無有恐怖物不占雜法滅不受瞞波浪盡離顛倒出苦海彼岸邊無有恐怖明大義無有恐怖到安養心中喜得自然逍遙樂受用常安身命不落偏可滿意謝蒼天西方淨土人人有不假修持已現前諸上善人如見性阿彌陀佛便同肩遠離顛倒夢想者若罣礙無恐怖絶自然遠離顛倒夢想仙師云日間無想念夜後少夢寐釋云夢因想生想因夢生世人只知合眼有夢不識開眼也有夢如何是開眼有夢仙師云假若金銀過北斗大限來時一夢中豈不是開眼也做夢若要夢覺直待無常方省生前所作所為所貪所愛一切萬緣盡是一場春夢只自己一身也顧管不得到此省時晚矣若是有智之人忽然自省自覺無常到來此貪欲愛樂盡是輪回之種地獄之因遠離顛倒悟本性空即知此身必無古云聖人無意無固無必無我無依無倚無晦無明無相無名無強無弱無穢無淨無止無作無任無滅無默無言絶思絶慮一切語言道斷心行處滅大上曰實無所得為化衆生釋云道妙幽微不可得見大顛云死了燒了無飢無渴無寒無熱無起無倒無坐無眠無六根無九竅無四百四病無八萬四千蟲永無顛倒若不如是悟去清淨界中才一念閻浮早通八千年會得剎那間不會塵沙劫死死生生展轉不覺睡長夢而不醒萬劫顛倒而無止顛顛倒倒死了又生生了又死夢醒又夢睡覺又睡迷中更迷終無了期若有人打得徹透得過永免顛倒也遠離顛倒莫顧稍守定自性根基牢不作惡罪山業海一齊消凡情退一切業緣不能縛妄心無自然魔境終須少恩愛斷枷鎖解脫樂淘淘心明朗閃開浮雲光爍爍不隨相破邪顯證智量高無執法微塵世界礙不著生死循還那箇逃此心未了慢途勞時今不做輪回夢只走人間這一遭究竟涅槃者反自窮究己身盡是虗假一日無常盡皆敗壞難以留戀如是究竟則可矣本來無此四大因世人皆執有身迷己逐物棄親向疏認賊為子妄將四大六根為實作種種業受種種苦輪回萬劫不覺不知不能解脫默然自省如此日夜不離當念自覺自照細細參究此六根五蘊從塵劫已來本自無有名相皆不可得亦無成仙作佛亦無六道四生種種皆不可得竟者盡也到這裡一槩平等盡底掀翻萬緣頓息內外無餘川老云如斬一握絲一斬一齊斷又云一拳打破化城關一腳躍翻玄妙塞南北東西任往來休覔大悲觀自在大顛云離四句絶百非知見無見斯到涅盤且涅盤無者非死也乃是寂滅無生無死之謂也太上云湛然常寂佛經云生滅滅已寂滅為樂寂者寂然不動滅者諸法不生實無生死也且道無生無死怎生模樣莫聽聲不是相識得虗空還一樣涅盤清淨無是非能攬不如快些推狂言狐行童作戲周回不定轉得迷三灾非是天降豫皆因都是自尋得棄親向疏無才漢逞強不順祖師機四十八願不當重口念心安意有違祖祖相傳無為法却將有為當真實凡所有相皆虗妄連泥帶水非善逝龍蛇混雜千打閧亂性之法難出期究竟自身元不有更須放下莫愚癡涅盤路上無朋伴大道無人我是誰三世諸佛者過去莊嚴劫一千佛未來星宿劫一千佛現在賢聖劫一千佛三世三千佛更有窮劫佛不可說不可說數量不可盡此諸佛皆從修證所得川老云種瓜得瓜種果得果又云一佛二佛千萬佛各各眼橫兼鼻直昔年曾種善根來今日依前得渠力道經云種蘭得香種粟得糧為善降祥為惡降殃且三世諸佛不修不得成人身中亦有如此諸佛變化不一因習氣所昧境物所障自家迷了却不認得若於心無心便是過去佛寂然不動便是未來佛隨機接人便是現在佛清淨無染便是離垢佛出入無礙便是神通佛到處優游便是自在佛一心不昧便是光明佛道念堅固便是不壞佛各各諸佛自身俱有說亦不能盡變化多般惟一真耳過去未來現在皆同一體如虗空不異相不自相不他相非無相非取相不此岸不彼岸不中流觀其寂滅永不斷滅若人如此頓悟直下承當迢迢空劫盡在如今放光動地人法俱忘不見有過去未來現在究竟到盡無盡地即是空空我無我我我尚不可得空色亦無三世自空非識不滅識性自空前際後際中際亦空休落空見要見三世諸佛麼咄沿河休害渴把餅莫言飢三世諸佛滿太虗外相分別妙在一一是無極真空體真空包裹天和地塵塵剎剎都是佛箇箇心內發光輝人人都有如來意衆生迷悶不得知無極化身千百億圓滿報身無善惡清淨法身廣無邊有能覺得些子意通天徹地透玄關遊行三界還本位安分守己實不虧無佛可做是天真守真志滿無上得依般若波羅蜜多故者修行人須要智慧百種方便去無始劫來習性調和成一真之性而登彼岸若不見性卒難成就此句是三世諸佛之母十方諸佛依此修行果行圓滿成等覺若離此句修行雖經多劫久守勤苦望成大道者鮮矣屬小乘法墮在聲聞緣覺辟支佛鬼仙人仙地仙有為之法終不成就一切聖果須當精進存有能所依般若波羅蜜多法得無上正真之道唯此一事若別修行過此法者無有是處此是教外別傳此法親見自性方乃傳授千聖不傳自悟自信不容授記圓頓之位獨孤標法參善知識求問至人憑師指示有緣契悟圓頓教沒人情若有私心傳授是外道法有分付有傳授有得即有失有教有授盡是外道邪見生死根本仙師云法有三千六百門直須知有箇玄微處不在三千六百門仙佛祖師自修自證本無語句亦無一法與人若有一法授記不名釋迦不喚道人道本無言只是教人自修自悟說著不真若被人教壞急須吐去大凡為人須從自己流出無量大義用之無盡上根之人一聞千悟具大總持中下之機多聞多不信太上云上士聞道勤而行之中士聞道若存若亡下士聞道大笑之此乃難信之法希有之事般若波羅蜜多故箇箇要尋出身路無極大道透長安放心穩便休恐怖望常久遠到地頭明心得見無量壽三世諸佛赴龍華恆沙如來無期數信心就是安養國信心就是真淨土極樂天善神謹擁護安身處無極謹背祖忘恩不依教現在諸佛不破邪顯證不順情感動諸佛不有理休學無行人得道全憑陰隲助得阿耨多羅三藐三菩提者西天梵語也阿耨言無多羅言上三藐言甚三菩提言深東土翻為無上甚深又云成等正覺此四箇字須是親見古云見道方修道不見復何修一大藏經說此四字不能盡諸佛亦說不盡三教聖賢皆修此四箇字盡歸聖道成等正覺今人若能依此般若波羅蜜多三藐三菩提法修行廓然頓悟親見無上甚深自知當作仙佛直超聖果妙道虗空是祖宗分真應化亦無窮若人肯悟真常道識得從前舊主公阿耨言無一體空多羅言上獨為尊三藐言甚無為義菩提言深道理精無上甚深四句偈佛流在世立教門四句妙偈三藏母一切修行盡包籠有人會得明四句一法通時萬法通超生越死離苦趣得了金剛不壞身脅枝打坐逍遙法順席立禪自在工倚墻靠壁真羅漢吸流呼嚧了道人不垢不淨無修證不增不減是現成不生不滅無量壽虗空現出活世尊故知般若波羅蜜多者因修行得見無上甚深之道知般若波羅蜜多之神力也且過去諸佛慈悲憐憫衆生百種智慧方便之力化人使泥土木雕黃卷赤軸說因說果但以假名引導有情將善惡報應之事天堂地獄之說使人改惡從善離假歸真聲聞緣覺十聖三賢諸佛地位次第接引仙師云千里程途逐步而進釋云千仞寶臺非一圾而上忽然自悟自見本性超過諸佛位次一超直入如來地若不見性向外馳求終不成就道云千日學道悟在一時只這一時便得輕快諸上善人同歸一處若是學解就古人唾津盡是外道邪見生死各路隨業受報不可共語豈不聞須菩提塵劫以前修行直至釋迦會下解空第一智慧請問四句偈廓然頓悟涕泪悲泣自嘆云前所得慧眼未聞此經三世諸佛皆從此經流出如何是此經雖然無一字晝夜放光明般若者省回頭抽胎換骨悟無生答根本別換身心談論話比尋常伶牙俐齒心明了知前後無所不通天開霧退浮雲光明出現似尋常地泉湧百草重生走獸欣飛禽喜空中展翅滿山川花開放見性明心波羅者因的聲虗空粉碎見親娘鐵面皮元是無生猶如似一輪紅乾坤普照盡十方遍法界無點昏雲千七百玄妙門門門劈破遍大地葛藤窩連土除根絶輪回證金身工圓果滿轉法輪救濟俺出離迷津纍劫中苦修行堅心不退若不是真實行怎敢天宮在凡夫本不少自為八兩入聖位本不增依舊半斤本不生本不滅妄生顛倒但回光肯返照箇箇圓成是大神呪者人人具有不修難明神呪亦是衆生心地法門有大神道通云心有主宰萬邪難侵儒云心正可以辟邪度人經云萬邪不干神明護門能驅邪立正變死人作活人改魔境為仙境頭頭示現物物全彰信手拈來百無妨礙此大神呪舉心動念鬼精滅爽返本還源外道魂驚精靈伏匿此密呪也神通并妙用何處不相隨有大威神力仗劒邪魔息不離方寸地同居人不識是大神呪有功能智慧般般物物通未曾開口先知覺性如寒潭徹底清難量難測真空體千變萬化顯靈根諸佛命脉風不透撥開心地正妙門一段清虗為大理有相身中無相身猫不成來𦘕不就無為三昧鬼難明巍巍不動安身處普光三昧照魔精凡聖同居憑柱杖魔來侵害休順情箇裏本無元字腳空中誰敢強安名等間點出金剛眼照破魔王八萬程是大明呪者一點靈光自然朝耀照徹十方射透三界山河大地無有隔礙過於日月無處不照呂祖云一點心燈焰焰生不勞挑剔朗然明得來照破人間暗獨放寒光滿太清木性彌陀一段光揚眉竪目亮堂堂晝夜常明無間斷時時不昧現西方巍巍一朵紫金蓮垂光萬道照大千悟知極樂剎剎現了達淨土在目前是大明呪現金光是大明呪照十方心發朗亮堂堂川山海無遮攔通天眼耀空蒼光一體在天端周圍照不落偏日月往來明又暗無明無暗自己光兩輪日月天地眼未曾初分光在前光中化佛無數億都合無極體相連神通化現能改變清淨法身道理全是無上呪者得見自己光明照見從前黑暗無有能極者此神呪最上無過於此是為第一一切諸法皆不出於心呪也光明洞耀普照十方包含法界獨古乾坤將別神呪要過此呪終不能及是無上呪者道云心是衆之王釋云心是法中王只這一件王不動萬姓自安心若不亂諸邪不起是無上呪一段空是無上呪未曾分無南北無西東無上下內外同無日月無暗明無凡聖無人倫無今古無始終先天母獨為尊無極道大極身太極元是無極體無極元是大極根太極始初分兩儀清濁升降天地踪陽為父來陰為母聚集成形化為人三才變化無窮盡枝枝葉葉到如今是無等等呪者此呪無有等齊也不可說不可比無有邊際此呪世間少時說著難信須是親見明徹識此呪也這呪放開包裹太虗空收來難立纖毫物此呪最玄最妙最尊最貴最大最深是自己心呪也無縫塔前分明舉不透玄關錯過多明明一句包凡聖中間自有古彌陀前生不修今不知萬丈玄門過客希有人但能歸向者定證圓明與佛齊是無等等呪希奇名揚寶號晃太虗一段金光明耀耀輝天鑒地照昏衢神通廣大無極呪諸般等呪不能倍此呪即是諸呪母舉心動念呪現出包天裹地陀羅泥神離鬼爽不敢欺有人持誦靈驗呪推碎魑魅化為灰魍魎妖魔精怪化獄消灾脫輪回能除一切苦者佛祖出現於世設種種方便救度群迷同出火院若有智慧之人諦聽大道之言只究心地莫去傍求初則打掃潔淨去纍劫之習性大顛云開池不待月池成月自來修行人先要心地清淨自然道生儒云以禮制心釋云在於間處收攝其心道云降心絶念三教聖人只教衆生心間清虗心若無染自然見性若得見性永免輪回更不受生得不死不生之道且從上諸佛諸聖久受勤苦方得見性心心念念處處逢渠且道末後向甚麼處去不省處處迷歸路悟來時時在本鄉能除一切苦便無超出三界免三塗為法忘軀離五欲五濁煉徹真金體五戒不犯難轄管無福無罪非五刑五蘊空處無凡聖五常不缺為大德世事忙忙無盡期火宅慌慌苦不知若還信受諸佛語火坑變做白蓮池穢土濁世苦娑婆無始以來造業多明宗返悟圓空性翻身跳出死生窩真實不虗者是真實法語非虗華之言一切諸佛說此呪度脫有情不是異語不是謙言永嘉云證實相無人法剎那滅却阿毗業凡所有相皆是虗妄惟此無相之相是真實之相大千俱壞此相不壞因甚不壞道有云有形終是假無相是真人又云百骸俱消散一物鎮長靈道經度人經云元始懸一寶珠大如黍米在空玄之中佛經云我有無價寶珠繫在衣裏日夜推究忽然見牟尼寶珠又云牟尼珠人不識如來藏裏親收得然雖如是見道易守道難要見此珠麼圓陀陀光爍爍轉轆轆活潑潑常對面不可捉真實不虗佛流恩直指四呪教人行普天匝地無極道十方世界任縱橫我師未明難入理不得真傳無投奔受了一十三年苦推開萬法不納心提起空來不放捨無邊境界盡參通空空還有不空處真空元是舊家風不壞身萬聖根知因背向歸本地燈燈相續一同明故說般若波羅蜜多呪者因修行到此知般若之功最能最勝最大此句結前種種方便具大總持同歸一心古云應觀法界性一切惟心造仙真云善惡存亡總在心大顛云迷者為含藏識死後作毒蛇悟者為祕密神呪得無生法如來有密語迦葉不隱藏此神呪若人專心受持功行圓滿常持此呪鬼神遠離諸天寂聽常歡喜般若寬智慧闊神通廣大海深變化無窮玄妙難量難測清靜無點微塵波羅得彼岸到守真志滿實在得見無生平穩巍巍不動安然得了深根有一箇陰陽誰三界那世界誰天地那大千根誰萬物那日月誰男女那五谷誰人知道無當母那箇知聞三教母誰諸佛母那藏經母誰諸字母那活彌陀誰活菩薩那活神仙誰諸佛祖那即說呪曰者是起根立天地之祖諸佛之母窮天地無更改萬劫鎮常存故曰名為四呪用心持誦不離左右順念逆念世間一切所求無不隨應十二時中不可忘却休教錯認了諸呪不能比也萬聖千賢在己身休教昧了本來真因何苦勸重重舉一翻提起一翻新即說呪曰細校量撥草尋踪識根源我今認得真空祖普復三千及大千有用現光不見體明空稱讚法中王陰陽二氣空裏現真空元是法中王天地乾坤日月星辰山河天地草木叢林古聖先賢地水火風四時八節五谷田苗綾羅布絹空裏現真空元是法中王金銀財寶珍饈百味揭諦揭諦者人空法空人法俱空二空全忘也道云身心不動之後復有無極真機洞山云人牛不見杳無踪月色光含萬象空且人空者只是教人忘形忘體法空者只是教人忘情忘念萬法俱損善惡俱敗不執己身不著於相忽然外不知有己身內不知有己心遠不知有諸物到這裡脫體全忘自然有箇受用處皆是自然之理也揭諦揭諦人法空兩頭不執休住心一物不定為玄妙萬境難拘義消停真空無踪形有相告白知因體順情箇裏本無元字腳本來面目難猫𦘕我順人情天不祐你順人情滅教門大家到頭無好處閉了賢門無投奔諸佛慈心發弘願狐疑不信背了思菩薩祖師護善遮惡難酬報謬誦此經墮沉淪棄恩背德粉骨碎身波羅揭諦者到空無所空是也仙師云既無所空徹底淨虎眼禪師云不識亦空著所空若是既無所空得到彼岸若到彼岸其彼岸亦須離而再進古云百尺竿頭進一步諸佛菩薩現全身且道是箇甚麼物認得麼他也轉你也轉對著面尋不見若得見成一片波羅揭諦復重徵寸心不昧見金容觸目對揚真般若山河全露法王身十方照徹華藏世界百草頭邊翠竹黃華我現身多寶佛塔無縫寶塔淨土就是本來面西方就是本來人極樂就是家鄉就是安身就是立命就是不生不滅本來面不垢不淨本來人不增不減無量壽佛這些便是假名號除了假名得縱橫豁開透地通天眼眼目就是本來人金剛寶劒本來面能掃萬法本來人真經就是無字就是本來面目無名號無名就是還見四句親切處四句原是本來面目無四句萬法歸一無二門一切萬物心變化本無一物得安寧波羅僧揭諦者是諸佛清淨境界也五欲塵勞染污不得如仙佛慈愍衆生隨機應化救度群迷在異類中真假不辨凡聖同居逆行順行不能測量如月在水應現千江本是一月普攝豈有二也故經云合光塵不染三界獨為尊清淨境界沒思量不染纖塵是道場試觀十五三更月影現千江百不妨波羅僧揭盡解脫今日學好業消磨廣行方便多積陰隲公道平等常懷仁義聽其天命回頭訪賢修心養性悟入玄門敬奉朝延遵守法度孝順爺娘和陸鄉親存心忍耐凡事儘讓弟兄和美安分守己守真志滿不殺生靈齊戒久遠不退道心菩提薩婆訶者菩提為初薩婆訶是末且修行人起初先須發菩提心勇猛精進日夜為道古云道念若還比雜念成仙作佛已多時只是學人不肯驀直便行三心二意故不能到仙師云數他堠子却不行口念長安心不徹若是有志底人一刀兩段修道學佛更無退轉久守不怠忽然悟道達本性空即得菩提超出三界了無所了得無所得蕩然清淨則到極樂之所受用無盡故曰薩婆訶且道行到甚地面是徹頭處水窮山處盡寸草不生時省得麼先發菩提一片心次教萬慮不相侵直教鑽透虗空髓拔出從前治病針菩提發心初開華薩婆結果甚堪誇滿盤拖出舍利子箇箇天生瑞氣發牟尼清淨離凡世神機威力越塵剎祖居元是無相國諸佛行行先結果歸家入會赴龍華菩薩祖師聖賢上人報恩知因僧尼男女惡人善人學好行行先結果歸家入會赴龍華經商行行念佛行行誦經行行知根達本參透無法心經注解三教言談妙義無物安撥開萬法直指單傳明心見性返本還源不離方寸法身廣無邊注經已畢更留一篇請晚學同志詳覽研窮修行且要自分明莫把身心枉用工平生若不洗心地坐斷山根總是空是心是法心是佛是佛是法佛是心天堂地獄由心造萬法不出主人公凡不減退聖不增分明八兩是半斤堂前無草休掃地鏡上無塵莫用工有人會得真實意休去他方問別人祖師心性訣證盟功德云一切罪業根即是由心造學道不修性萬年無究竟通看世上人幾箇分邪正口即說無為心裏懷詛侫不信真空法執著修持行欲成聖賢身先去貪嗔病說心不識心說性不識性假使共商量舉意要爭競為勸善緣人堅心須諦聽念却五車書不如修心性性是真空心心是妙覺性妙性與空心本性元清淨清淨無人我人我豈識性思量四大色身幾箇得知來去從根至本思量實即令人思慮來即隨緣而來去即隨緣而去死即四大分張生即依前積聚積聚地水火風輪回生來死去修心漸近真空平等名為甘露若能回換身心便是修行門戶思量上古先賢盡是從迷入悟依隨道德為師瞻仰虔誠父母癡心若入輪回永無生天道路真智微妙真空更不回頭譬喻心中自有真佛尋覔何須遠去其間言語是誰行步是誰行步耳內誰聽音聲眼內是誰觀覷鼻內誰嗅誰香口裏誰分甜苦是誰愛衣羡食阿誰嫌貧戀富行住坐臥由誰靈性溫柔四句色身即是舍房五眼廳堂門戶若能不壞不崩我即中間且住安樂無害無灾是我神明防護有我早道僂儸無我便無憑據聞得如是強健勸汝早須省悟思量四大色身實為不能堅固須是自己勤修道即從師而悟佛即不度衆生究竟衆生自度人生向死便死死後知歸何處四大當下分張骨肉化為泥土聞我未去中間便好修心覺悟覺取真空妙道更莫輪回受苦若能得知本源性是西方佛祖妙法源流古至今衆生自染受諸塵修善若無出世法枉念彌陀過一生天上天下無物比包天裹地獨為尊不是聰明伶俐漢愚癡衆生不得惺法寶傳流救十方佛言佛語細參詳救度大衆皈淨土休入陰司受恓惶人身得處最為難莫把浮生當等間須藉心經三昧力直教打破死生關又曰心經者是諸佛之骨髓菩薩之命脉祖師之大義三教之道理修行之門戶萬物之根基一切法中之王藏經之母人能虔誠念此心經勝看一覽大藏解其義者超生越死兔地獄脫輪回皈本源入無為譬喻天平真假相對不錯毫釐明心見性真實不虗上和下睦心中處左達右對自心呈前瞻後視心中盻應遍十方自心明腔裏無物神通現斯即涅槃心非心這是吾師傳妙法餘外並無一點情老君曰若夫修道先觀其心心為神主動靜從心心動無靜不動了真心為禍本心為道宗不動不靜無想無存無心無動有動從心了心真性了性真心心無所住住無所心了無執住無執轉真空無空處空處了真五從無量劫來觀心得道乃至虗無有何所得為諸衆生強名得道吾觀衆生不了其心徒勞浩劫虗役其神於心無了永劫沉淪依吾經教逍遙抱真釋迦七七表此義三十三代無別因六祖以後無接續廣傳雜念當修行不明心性非道理我師苦行直搜根參透虗空不放捨劈破玄門針對針初立世界佛掌教毗婆尸佛早留心直至如今不得妙吾乃杳冥續慧燈慧燈不滅魔難入智鏡常明夢不侵不依正教瞌睡漢從他萬劫自昏沉三塗永息常時苦六趣休隨汩沒因恆沙含識悟真如一切有情登彼岸乃至虗空世界盡衆生及業煩惱盡如是四法廣無邊願今回向亦如是心經原是佛心印熟讀心經便入機欲識真空無色相全憑智慧作階梯會中大衆潛心究教外斯民任意歸樹葉河沙俱證道同登彼岸力家宜施財弘經大慈心不住有無名相存前後體空君子德婪謗護斷昧心人自己心無隔礙處才是知恩報德人佛祖光明周圍照不教人在暗中行大明萬曆拾一年歲在癸未玖月吉旦嗣祖比丘慧定勸化善信命工鋟梓印施普資恩有見聞解悟同登彼岸此經板在福建省城華林法堂刊行

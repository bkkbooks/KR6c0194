body:
  text: 略移移者乃權宜捷要催行拶步快登彼岸也佛生西域光明普照傳留心經一本徧於一方人皆誦念不知裏義所有大顛無垢二祖註解及前後註者尤多幸而大明正統年間吾祖出現於世顯化功德檢教此經都得明心是以門人姜公重請諸佛祖續固餘言開分之說替佛祖弘教施行諸方便覽眾成勝事又表金陵遇經道人程情授之辨固當應眾知間少板無印缺於慈念所以化資重刊書帙印濟流通定語通無極是人正可入識得自在理不用些毫力一卷心經一點真點真演出許多經若展此真充法界千經萬典盡分明未曾舉念事方圓聖卷無邊隻眼藏明心見性真實理通宗顯教法中王一點真元空不空虗靈清淨現圓通川山透海無窮測踏破玄崖處處春看經切要急通宗宗若通時教亦通宗教若還通徹了吾心包褁太虗空摩訶般若波羅蜜多心經觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄舍利子色不異空空不異色色即是空空即是色受想行識亦復如是舍利子是諸法空相不生不滅不垢不淨不增不減是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得以無所得故菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶心經畢偈曰這卷真經本在心自家寶藏不須尋猛然檢著無生品迸出明珠耀古今這點靈光道上來只因逐妄墮塵埃君今要見還鄉路悟得心經道眼開這輪心鏡本無塵因塵難照本來真塵盡鏡明無一物自然現出法王身隨方就圓大摩訶當面識破出奈河我今認得西來意便是長生不老佛本經註解一總持仁德君子重意參吾心亦要普度眾方纔如是方便刊知重知因就理是莫笑書本發狂言若肯死工都貫徹就如靈宮井通泉

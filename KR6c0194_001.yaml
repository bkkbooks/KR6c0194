body:
  text: 蓋聞往昔因中聖祖出現於世降生在梵王宮內乃名悉達太子尊德釋迦文佛道號稱能仁也心懷大德道行天生有理自然明通三界無比願不為王做君四城門遊玩觀境見生老病死之人即往雪山避靜六年功圓果滿回還太國行孝先度父母見性後度耶輸公主明心向善辦道出苦一家四口都得成尊上前辭親別朝收拾起鉢盂錫杖遊方演教四十九年説法利生三百餘會讚曰空本無相却來現形有體玄妙無字説下一覽大藏吾乃初進入會遇著心經一卷人念我聽知也言言見諦句句超宗聞其意趣納心不捨學會持誦諷念不知利益多虧明師訓教妙法一言訣開心地一向杳冥無能報祖之恩拙詳稍注粗心略表續固餘言替佛弘教心經者二百七十字義分開六十二句之因雖是心經最小包含三藏無蹤雖然字點不多超凡越祖絶情非是我能我強諸佛倚妙法出現於世不倚小乘法濟度於衆生金剛科儀作證有求有苦八風五欲交煎無著無貪三明六通自在便恁麼去水邊林下月冷風清不恁麼去橋斷路窮別通消息還委悉麼稽首歸依發虔心上人隨喜來降臨宣念佛祖甚深卷知音納受志心聽天地包含萬物中一切萌芽養群生蓋載之恩難酬報喫齋念佛報重恩日月兩輪往來循周而復始現光明照臨之恩難酬報喫齋念佛報重恩皇王洪福萬萬春五穀豐盈國大平水土之恩難酬報喫齋念佛報重恩父母劬勞苦無窮為兒為女費心勤養育之恩難酬報喫齋念佛報重恩奉勸世間知因人廣行孝道敬雙親供佛齋僧濟貧苦龍天偏向孝心人莫瞞天地莫瞞神心不瞞人禍不侵十二時中行陰行災星變做福星臨無上甚深微妙法百千萬劫難遭遇我今見聞得授待願解如來真實意摩訶二字西天梵語也東土翻為大且大者莫過虗空大道也廣無邊際之謂也廣大無邊者莫過虗空大道也川老云虗空境界莫思量大道清幽理更長又云十方無壁落八面亦無門大道無邊際虗空難度量道云迎之不見其首隨之不見其後儒云仰之彌高鑽之彌堅瞻之在前忽然在後諸賢聖皆如此稱揚廣大也日月雖明難比其光乾坤雖大難包其體能生萬有而不見其形遍周沙界而不覩其蹤雖是如此廣大玄妙誰知更有一物過於此者且道是何物還識這箇麼寬則包藏法界窄則不立纖毫顯則八荒九夷無所不至隱則纖芥微塵無所不入今者不避罪愆分明漏泄乃人之本源也仙師有云為甚此心關大道只因元向道中來世人不能返本者蓋因錯認色身為己被六根所瞞七情遮蔽自失本真以致流浪生死也要見本真麼尋不見覔不見十二時中遍身轉摩訶一消息從來不得知今日才會面世上無物比大摩訶是真空無極妙體是為玄無相法身是真常無窮道理是妙意無為深根變陰陽治下日月變五形春夏秋冬變四相一切凡聖是真空萬聖之根是玄妙神通廣大難測量無相家風堅固身不生不滅堅固體不減不增堅固體不垢不淨堅固體那箇知聞參透了大摩訶無有轄管自在縱橫般若二字西天梵語也東土翻為智慧且智慧者正知正解審察之謂也修行之人須用智慧之力降伏身心不令放肆以習靜定道云能以智慧之力攝伏諸魔精儒云智能破邪慧能破暗且無智慧之人作事粗惡不肯三思惟務廣學多聞念在誇談講論不究自家生死好覔他人是非不親真實道人愛近虗頭禪客空談聖人經典心地全不用功圖名貪利我慢貢高只顧眼下時光不想腦後之事如此之人乃聰明外道也古德永嘉禪師有云外道聰明無智慧仙師云口説心不行非是精細漢儒云先治身心後治家國且有智慧之人作事安詳不肯造次識因果顧罪福親近知識參問至人窮性命之根元究生死之大事制伏身心收斂神氣念念在道息息歸真一日功成行滿叻地一聲透出三界與虗空混為一體若到此地造化不能移易陰陽不能陶鑄四時不能遷五行不能役神鬼不能拘劫火不能壞作箇逍遙自在物外間人要見物外間人麼六座門頭常出入雖然相近不相親開著眼休教蹉過省的麼般若智慧斬魔力破邪顯證不相饒正知正解行正路降伏身心萬事拋道倚智慧妖魔滅佛倚智慧業障消儒倚智慧無黑暗都憑智慧出塵勞不生智慧逞剛強作事粗糙自發狂無有三思非明理惟務廣學不忖量念在誇談競名利不顧性命去貪𢛓背恩忘義殺佛祖愛近虗頭棄根元智慧聰明有道德作事安詳有辨才不肯造次行因行能顧罪福似如來親近知識求出世參問至人躲苦厄窮理盡性達根本念念在道歸去來波羅二字西天梵語也東土翻為彼岸此岸者生死之際也彼岸者出生死之岸也迷者此岸悟者彼岸世人若迷本性即愚癡顛倒認四大六根為己爭名競利謀千年活計積萬劫之冤愆背覺合塵迷真逐妄忙忙而不知休息念念而心境不除忽朝大限到來臨行手無所措這裏脫下濕布衫那裡穿土虱虱襖去去來來改頭換面似蟻循環何日是了生死苦海幾時得渡如是之者只在此岸若有人猛然自悟從前所為所作盡是虗假棄假修真窮根究本常近至人常親知識求過岸之舟覔方便之篙度過愛河苦海而登彼岸得脫生死洪波更不拖泥帶水作箇腳乾手燥清淨自在間人也且道如何得達彼岸他人難用力自渡自家身波羅者登彼岸腳踏實地上岸人無恐怖晝夜安寧這苦海廣無邊翻波浪滾水面上浮漂漂膽戰心驚虧明師拔濟我出離苦海思量起在難中膽戰心驚修下福還造業不得了手六道裏周流轉受苦無窮無量劫迷失了生死受苦虧明師拔濟我才得脫身在四生異類中重重受罪思量起生死苦膽戰心驚得人身是火宅三災八難思量起疾病苦膽戰心驚虧明師慈悲心不擇貧富想明師難酬報怎肯忘恩走著思坐著想時時提念得妙法免三途救苦天尊蜜多二字西天梵語也東土翻為無極又蜜者和也多者衆法也且無極者至高至大難極之謂也釋云無極道云太極儒云皇極皆謂此也今分明説開蜜之一字亦比於大道虗空多者謂萬彚也譬道能包含萬類有情無情盡在太道之中人之真性一同亦能包藏萬法萬法盡在一性之中太虗之內有八萬四千異類種性説不可盡皆在人之一性之內一性譬如蜜種性喻於多修行之人以一性均和種性合而為一故曰蜜多道云識得一萬事畢釋曰萬法歸一儒云吾道一以貫之且道如何是一還識這箇麼五行不到處父母未生前雖然説破不行難到直須去盡塵垢方見省麼蜜多喻於虗空談天地有盡空無邊空包相法空裏現空包日月空裏玄空包星辰空裏轉空包天河空裏安空包天地空不動空包萬物空最寬外包乾坤森羅相內中灌滿無空間通身都是無極道十方周遍盡相連諸佛菩薩真空現羅漢祖師空現前老君夫子真空現閻王神鬼空現前信心還得空常現真空無相體皆全明心見性離凡世性是真空還本源心者一字人之本源也一切萬法盡在一心之內有八萬四千等動則無窮無盡定則不變不移釋云心生種種法生心滅種種法滅道云心死則性月朗明心生則欲塵遮蔽儒云制之一心則止謀於多事則亂是以古聖教學人收攝其心歸於一處喚作萬法歸一又名一字法門因人不信是心是佛是心作佛所以多種方便指示世人見自本性豈不見古云三點如星象橫鈎似月斜披毛從此得作佛也由他上天入地皆在自心所為非他處所得因識心者少亂性者多故失真道矣為甚不識其心只因多惑其性皆緣識神昏昧逐境迷心六根內盲著物亂性不生智慧愚暗之故也若肯修心窮性命究生死親近明師參求法藥療治心病念茲在茲步步行行坐臥不忘語默動靜不離這箇忽然眉毛竪起眼睛露出便見本來面目且道本來面目如何形狀川老有云火不能燒水不能溺風不能飄刀不能割軟似似兜羅硬似鐵壁天上人間古今不識知道麼終朝常對面不識是何人這箇心是人人無為大義是人人無為神通是人人無為大理是人人無為光明要學好行門廣大要學反是不成人要行善龍天保祐這箇心要行惡禍害隨身習道理天堂大路不行善地獄之根行公道祥光出現不公道求吉成凶提起來千言萬語放下時神鬼難明性歸心變化多改頭換面心歸性不動搖立命安身經者一字直也是世人修行之徑路也學人得此不疑休要誤了工程驀直便行須有到家時節只怕頭路不真差行錯認且道向甚麼處去是豫今明説向寸草不生處纖塵不立處無泥水無坑坎淨裸裸赤灑灑平平穩穩處去猛然逢著一顆圓陀陀光爍爍亘古不壞如意光明寶珠親手拈來得大利用不受困苦釋云摩尼寶珠道云黍米玄珠儒云九曲明珠要見此珠麼一心象外覔休向世間求真經大意現心華言言句句談妙法有緣千里來相會信心之人守根芽有字還得無字念三藏教典內中發入裏甚深還得本守真志滿得歸家納心平正無極道一條大路定不差巡行數墨不解意每日空念摩訶薩真經有意細細參字字研開過玄關在世了達超生死過在亡靈得生天佛説真言勸迷留僧尼道俗急早修但明一句離地獄免得兒孫作遠憂觀自在菩薩一句真直言自在菩薩人人皆有只因六根諸境遮障不能觀看情欲萬緣所牽不得自在若有智慧之人信得及放得下但於幽靜間處打併身心坐令極靜靜中更靜無纖毫異念一心清淨守至靜極猛然一動有一真人在自己靈宮往往來來縱橫無得這裏方見自己菩薩優遊自在一剎那間遍周沙界盡是活菩薩光明普照諸人若要見此菩薩觀之不用其目聽之不用其耳去耳目之用才識自在菩薩道云視之而不見聽之而不聞離種種邊名為妙道金剛經云若以色見我以音聲求我是人行邪道不能見如來儒云視不用目聽不用耳去耳目之用自然得性如是之者方知一切處此真仙菩薩未嘗不在同坐同行同歡同笑寸步不曾相離只是自家昧了要見此菩薩麼雖然出入無蹤迹爍爍光明見也麼觀自在見菩薩常現妙用發出神通不離左右晝夜殷勤行住坐臥處處現身參禪打坐數佛念經不怕生死貪利圖名人人皆有捨父投親觀自在活菩薩難描難畫非相非空無遮無擋不壞金身觀自在活菩薩千變萬化但回光肯返照箇箇圓成行者一字修行也路徑崎嶇不修難行且修是修心向道行是行善歸真如人修路相似去礙路荊棘除當道頑石高者斷之低者填之打掃潔淨便坦然平穩人之心地亦要如是下功去一切損人利己之心如去礙路荊棘相似得登途路穩步除一切雜念障道因緣如除當道頑石一同得進也屏垢心絶染污打併清淨此乃修行初入門戶之方便也非在口説亦非足行全憑心地下功仙真云心地下功全拋世事釋云心地法門非在舌辨儒云説不如行行不如到又要看這一步從何而起若知起處便知根源昔日劉海月參白雲師父拜而問曰弟子念慮降伏不住如何師問云是誰念慮云是弟子師又云是誰降伏海月似省不省沉吟微笑師云來去都由你們好沒主宰若是敵他不過即便放下更要知他放下的是誰若識得自有主宰便不被他瞞過海月遂省禮謝而已又石霜和尚問石頭和尚舉念不停時如何石頭云是誰舉念石霜於此大悟但只如此體究念念不離於當處舉意思慮語言知覺細細審觀從何而出古云欲知佛去處只這語言是道云要知本性根由不離言語動靜寶公云未了之人聽一言秪這如今誰動口然雖如是説開向上更有妙處不修不行不能自到若果到家鄉則罷問程矣且家鄉遠近迷則千山萬水隔悟則回頭便是家理會得麼行善之人心地寬無煩無惱晝夜安從他世事紛紛亂名利盡處樂自然行好之人心地良看前顧後意望常到處逢居隨緣分處處知足處處安行正之人似水平寸心不昧萬法明打破機關間事少參透無為真對真行正之人道理齊三教精通盡歸依道是無極真空體理是大用道中出行正之人甚開懷忽然有省見如來真佛常現無形相可憐無智自故𭛯深者一字幽微玄妙徹骨徹髓處也若要到此田地須是打併輕快方可道云損之又損之以至於無為釋云放下又放下自然身心輕快儒云苟日新日日新又日新要如此者須去靜坐日夜打掃直至掃無可掃寸糸不挂如父母未生前燒了一般古云貼體汗衫都脫却反求諸己廓然無自然到家且道不得還家者何也日晚程途遠身困擔頭沉十萬遊磨遍無始到至今甚深處玄妙理無人通曉難開口不敢應承是無為難量難測不可説即是真空人難惺十分奧妙實難參幾箇知因難下手本無一物甚深處無底沒寸步難行解不開難信之法若得了甚深處晝夜歡欣腳踏實地立命安身再不輪轉無相家風常生不滅不壞金身無邊聖境受用無窮虧明師説透了甚深之處元是我清淨體一段靈明般若二字西天梵語也東土翻為智慧大凡為人須要自生智慧若無智慧真是愚人空過一生甘伏死門有一等無智之人以聰明謂之智慧大錯矣且聰明之人賣弄精氣役使心神出言如飛龍俊行持如跛鱉瘤龜貪利圖名紐粗作細看世財如骨如髓棄性命若糞若土只知明日後日今年後年不知老之將至死限臨頭可惜空過時光虗勞一世似此所為生死輪回如何脫得且有智慧之人外行愚鹵內默安詳識有生有死悟無得而無失常自諦觀生從何來死從何往發此一念親近知識參問至人求出世之法逃生死之路避過惡如避錐刀顧性命如顧寶貝動則安人利物亦不被境瞞靜則入定觀空更不滯莾蕩如是之者一旦果完擺手還家得大自在先師云一日得還鄉不作飄蓬客釋云撒手到家人不識更無一物獻尊堂川老云孤舟到岸遠客還鄉且道如何是鄉遠後十萬八千近後不離當處會得麼智慧聰明總是心智人修內蠢傍尋若人有智超三界無智愚夫生死臨般若有力智慧刀斬斷思愛出塵勞休等大限難底背無常殺鬼不相饒守真志滿為綱紀齋戒嚴切自然高門口挂著生鐵面不順人情罪業消智慧之人心不往外行愚鹵內安詳念念在道不放捨時時用意默默參功成行滿因緣至㘞的一聲道現前橫遍十方無遮擋竪窮三際運用寬波羅二字西天梵語也東土翻為彼岸且迷者有生死墮輪回只在此岸也悟者超生死脫輪回到彼岸也若要到彼岸須是自生智慧過此生死苦海如人過水水深難過須用船橋或用木牌竹筏多種方便盛載過此苦海而到彼岸既達彼岸前者船橋木牌等物盡皆無用見性悟道者亦復如是大顛云如盲人求醫遠路不能自行須假人牽兼手中有杖方可無此二物不能得到既到醫家醫師與他點眼大見光明其杖與牽人都無用處頓悟涅槃正道亦復如是且道甚是牽人柱杖豫今説破信者便行然後須辦取內功求見性之法了生死大事一日功圓得見本來面目便是柱杖也更要參訪明眼師真大德便是醫人也從前多種方便盡皆無用惟柱杖不可棄了道云得魚忘筌得兔忘蹄釋云過河須用筏到岸不須船儒云得意忘言得米忘田旦道都教忘却因甚只不教棄了柱杖求到水窮山盡處且存作伴過時光理會也未這根柱杖本無相元與虗空無兩樣若人提起透三天遍界邪魔不敢望波羅者上岸人腳踏實地行善的出苦海不受塵淪參大道明性理還有好處歸家者到本地立命安身三世佛都在此華嚴海會極樂國受風光無盡無窮思量起苦海裏翻波浪滾水又深無船渡不得逃生晝夜家怕生死憂愁不盡訪明師遇不著怎脫紅津見一人説佛法應聲高呌論無為談理義本性元因言言真句句正單朋自己三教同合聖心與世無情這箇理是佛祖普光三昧掃萬法劈玄門照破乾坤心裏喜可信受別無一念波羅蜜登彼岸才得安心蜜多二字西天梵語也東土翻為無極且無極者無極而太極也乃虗空妙道也古云無極而太極太極分二儀二儀生三才三才生四象四象生五行因有五行漸漸滋生萬類萬類盡在妙道之中包含也今以蜜之一字喻於虗空妙道多者比於諸品衆類有情無情皆屬道之含攝且如蜂採百華醞造成蜜未成之時有醎酸甘苦辛之衆味青黃赤白之衆色其味不等其色不一一日功成蜜就種種之味釀成一味般般之色混同一色馨香美味一無差別到此則蜂得養生人得受用修行之人亦復如是且如修行之人調伏身心朝磨暮煉功行未成之際有慳貪心利名心嫉妬心狼毒心計較心勝負心貢高心我慢心殺害心三毒心怕怖心邪匿心妄想心無明心愚濁心不善心哄人心暴惡性粗躁性風火性見趣性乖劣性虗詐性好閧性撅強性顛誑性浮華性諂曲性分別性貪嗔性恩愛性返復性自無始以來一切習性貪心八萬四千有餘也説不能盡智慧之人一刀兩斷立志防身窮根究本功圓行滿頑心自盡邪性以滅顯出聖心真性並無差別獨露真常得大自在古德云衆星朗朗不如孤月獨明道云百川流有盡一海納無窮仙師云千思萬慮終成妄獨守一真道自親且道如何得見一真蜜多二守非等間調理一切歸本源用時嘗著心中美諸味不同一例甜憐憫方便人盡喜溫良慈善敬奉寬達本性空隨緣分捨命承當可向前信心納受無極道大用不缺理義全鐵面無情生死斷疑心放下當時安要了無常不打緊不發智慧甚是難順著六賊都惹禍心猿意馬最無端罪生一人難出苦休沉墜落著力參恨儀不能加精進輕輕跳出是非龕時者一字當時也為人在世多有不惺一時覺悟明徹心地識破萬緣是假了知世事空華直下回光便得清淨清淨自然合道古德云清風颯颯透心懷此時快樂人難識玄之又玄妙之又妙無東西南北無四維上下無過去未來現在與虗空平等與大道無二共歸一時並無二處川老云時時清風明月鎮相隨挑紅李白薔薇紫問著東君總不知且道東君在何處安身見麼打不離割不死在桃紅李白在薔薇紫呵呵一時間尋思起人生在世求衣食晝夜忙不得消停妄想心巴富貴爭名奪利逞剛強能紐揑使盡精神不赼意昧血心欺天越理一箇箇捨死命不顧殘生這今生得人身非同容易遭刑限屈死鬼永不翻身眼不瞎耳不聾從見榜樣休學他拙智人空過光陰休等的大限到臨渴掘井那時間無常至怎得道停趂如今四大安堅心進步身無病休無疾旱辦前程明的心見的性超凡越聖自然得明珠顯體透玲瓏精裸裸一段光眼前放著明歷歷不復藏常現金身無晝夜放光明縱橫無礙到這般田地裏自有前程做道人立志氣出得苦海到安養極樂國好處安身照見五蘊皆空者説四大不實五蘊者色受想行識也此五等因積而不散妄認色身是我故長劫輪回若人猛省借此幻身依教修行常自返照照見五蘊淨盡且道如何是色受想行識怎生得此五蘊皆空豫今直説分明若有解語之者休生疑惑信受奉行必有契道之日且色者窒礙之義若見境逢物不著不染是無窒礙也色蘊自空也受者領納之義若遇一切聲色境界心不領納得受蘊空也想者妄想思慮之義若過去不思未來無想現在自如得想蘊空也行者心念不停遷流之義若十二時中心不外遊念不煩亂不被物轉不被境留一念不離當處得行蘊空也識者別辨親疏之義亦乃著物之理若見一切境物一無分別辨認一槩平等見如不見識如不識無親無疏來則應之去則不思得識蘊空也既得到此田地自然照見五蘊皆空六窗明淨淨裸裸赤灑灑沒可把又有甚四大五蘊名字亦不可得道云惟見於空釋云虗空獨露昔歌利王道獵遇一仙人問語不答先卸左膊次卸右膊節節支解仙人面無恐懼並不改顏又罽賓國王問獅子尊者曰在此做什麼尊者答曰在此蘊空王問得蘊空否尊者曰已得蘊空法王曰求師頭得否尊者曰身非我有何況頭乎又肇法師云四大元無我五蘊悉皆空將頭臨白刃猶如斬春風又舍利弗見天女問云何不變却女身去天女答曰我十二年覔女身了不可得教我變箇什麼又鏡清和尚住院三年本院土地要見師顏不能也又太古郝真人在趙州橋下辦道忽一夜聞衆鬼於河邊共語云明日有一戴鐵帽人來替我言訖杳無言耗至次日將暮大雨忽作見一人頭頂一鐵鍋遮雨至橋下浴洗腳過橋太古一見喝不可洗聽真人之言扶欄上橋而去至夜衆鬼皆至一鬼言三年等得一箇替頭被這先生破了衆鬼欲害真人來往尋覔不見不知真人在於何處嗟嘆而去真人只在橋下鬼不能得見又弘覺和尚住庵天廚送供後參洞山和尚又來歸庵天人三日送供不見庵主庵主只在庵中為何不見這些上人皆得圓頓之法隱身之訣神鬼俱不能得見四大不實色身非久五蘊盡空甚是本來面目這一句從那裏得來照見五蘊空底可是誰神仙得了五蘊空王問三次不應承君王惱怒尸殼壞顯出金剛不壞身獅子尊者得蘊空君王相問我無身國王不分斬首計死而無懼性歸空法師曉的五蘊空揚説四句甚分明有人會得無為法刀不能劈本來真天女明得五蘊空舍利向前使機風轉女為男成羅漢返妄歸真不脫生鏡清和尚會蘊空三年土地不見蹤佛得利益神通大參了大道怕鬼神弘覺得了五蘊空天人送供不見蹤無為三昧難測量隱身之訣顯功能識破回頭便下功了然脫灑悟心空從他世事都零落其中別有一神通度一切苦厄者佛憫衆生開權顯實超生越死得免輪回苦太上云吾有大患為吾有身及吾無身吾有何患釋云身是衆苦之本儒云有身有患無執無憂經云三界無安猶如火宅衆苦充滿甚可怖畏若是有智之人返照自己悟得自身皆虗幻非為真實何況他物一日無常盡皆拋撒百無一用念念如此心境自除雜念自少更要參訪知識親近智人求出身之路了生死大事忽朝㘞地一聲脫下漆桶底便見本來面要見本來面目麼古今無改變人自認不真明師説破了元來這箇心若得心空苦便無有何生死有何物一朝脫下胎州襖作箇逍遙大丈夫堅心學道似如來度出一切苦厄災常齋到頭似如來不惜身命似如來慈悲方便似如來孝順父母似如來行門廣大似如來不擇貧富似如來調御丈夫似如來教人安心似如來現成得道似如來舍利子者辨真假二儀也舍者屋舍也比四大色身是也利子者舍中本來一靈真性主杖堅固體也如客店主人暫住主若離舍屋即倒塌利子常在只是換了房舍居住道云身是氣之宅心是神之舍久而神氣散又是移屋住釋云無始以來賃屋住至今誰識主人公藥山又云皮膚脫落盡惟有一真實要見真實底麼還識這箇也未又云來來往往幾千遭只是世人摸不著四大茅庵一間窩包藏天地及山河其中有箇真仙子不染纖塵老摩訶鎮大羅舍利元來一同居色身有形性無為性是真空不能壞有形決定死來催舍利本是堅固子色身不久化堆灰信受自己真舍利無始以來幾曾離舍利是我主人公行住坐臥常在身千變萬化舍利用元來不見體是空色不異空者更無分別也道性非二真空一等只在目前應物現形人皆不識長者長空短者短空方者方空圓者圓空白者白空赤者赤空小者小空大者大空遠者遠空近者近空道云人人本有箇箇不無釋云蠢動含靈皆有佛性儒云一切含靈各具一太極古德又云塵塵是道塵塵是佛仙真云何物不稟道生何物不稟道化隨處現形隨所自在道不遠人人自遠之返觀自身是色色中須有真空覺性應現種種相種種相即是真空覺性所現永嘉云幻化空身即法身法身覺了無一物本源自性天真佛仙師云有形假相內包無相真形寶公云有相身中無相身無相終日放光明理會得麼色不異空體混合三世如來修蜜羅萬法歸一禪那體凡聖同居體禪那大道不分平切義八了無為明解脫障礙不著安穩處無諍第一並消麼前世行惡轉輪回今生為人盡不知聞著好意心懷恨業根深厚離更移無始以來修因果纍劫種下大根基遇逢善事生歡喜定正圓明與佛齊空不異色者枝分稍異根本無別色空元一種世人自分別道云大方無隅混然一體釋云總三千界成一世界儒云登東山而小魯登泰山而小天下撤去藩蘺何彼何此古云賢聖常行平等智不生分別相三教賢聖亦是空四生六道亦是空上至仙佛下至蠢動草木箇箇元來是空且大朴未散陰陽未判二儀未分三才未立有甚你我元來皆是一箇道理因大朴散天地合三才成立萬生滋生直至如今不能返本為何只因衆生執著不知元來是空迷己逐物心生倒見隨物流轉不能歸一機見不同著色著空色空二見若人於此廓然悟空平等身心內外無餘不見空色不被物使不被境瞞一槩平等有何二也便得歸一只這一也是多了重陽祖師云抱元守一是工夫地久天長一也無古云萬法歸一一何歸一歸之處要君知且道一歸何處狗㖭熱油鐺空不異色表前因起初之時本不分未曾判斷無一物上下玄空一片空無陰無陽無天地那得日月共星辰無男無女無賢聖也無三教都無蹤紅蒙茲萌分三儀瞑幸始第一氣生盤古至今隨萬物人在其中順五行背明投暗心不徹不想歸源尋固根身是父母陰陽湊思謀佛性那里人色即是空者辨箇邪正之理也空在色中世人難見眼是色不能見物只是真空妙性能見耳是色不能聽聲只是真空妙性能聽聲鼻是色不能知香臭只是真空妙性能知香臭舌是色不能言語只是真空妙性能言語身是色不能覺觸只是真空妙性能覺觸腳是色不能行走只是真空妙性能行走手是色不能拈掇只是真空妙性能拈掇且夫真空妙性無眼能見無耳能聽無鼻能嗅無舌能言無腳能行無手能掇意根有名無形分為八萬四千見聞覺知總歸六根遍身互用神通妙用古云通身是遍身是道云不須他處遠搜尋十二時中繞遍身色空不異妙理全彰色可色非真色空可空非真空總歸大道不是空且道此理如何川老有云有相有求皆是妄無形無影墮偏枯堂堂密密何曾間一道寒光爍太虗道云知空不空知色不色名為照了豫今不免饒舌説破若見一切有相境物休教染著若到情忘念絶之處休教迷真著相則著有迷真則落空不著有方是了事底人色即是空礦中金塵裏埋沒幾千春用心掏沙尋著寶明師説破現金身眼觀一切金身現耳聽一切現金身鼻聞一切金身現口談一切現金身手拈一切金身現腳行萬里現金身體知玲瓏金身現意變推詳現金身千變萬化金身現晝夜出巡現金身劈撥攬草金身現識了大用不見蹤大道不離方寸地不須他處遠搜尋空即是色者重重細説也色在空外人被境瞞仙師云道無萬彚則不能顯萬無道彚則不能生釋云見色便見空無色空不見是以三教聖賢不見有色有空色空雙泯內外無分別如如常自然光明洞耀周遍沙界世人則不然也分內分外論彼論此著相分別見種種相隨聲逐色迷真不覺出殼入殼展轉不知改頭換面無有了期非干他事是自尋得底何不及早回頭自救且道怎生救得放下從前惡水罐揀著痛處使金針空即是色都不實色即是空兩虧殊二邊中間生死路色空雙泯落便易凡所有相皆虗妄參了無為説有為殺佛滅祖遭刑限閻王惱怒鬼來追後學先得成佛道不中久習早是遲萬法幾時學得了哄著迷人看攬集大限到來無定準心地不明怎出離有人曉得祖師機一句了然超百億一槩均平有甚差本來元是一人家只因著在枝梢上迷了從前大道芽受想行識者貪心不了之意因眼見故受色因受色心有思想因思想念行因念行有識解有六根因六根生六塵一識便有四大五蘊有此五蘊色身便著相分別隨聲逐色憎愛憂恐從茲而起以致流浪生死而無停息若要生死斷輪回止但從起處一根照破令四大五蘊淨盡廓然無無我當下空寂直下承當空劫已前自己寂而常照照而常寂太上云寂無所寂欲豈能生欲既不生即是真靜又云唯見於空觀空亦空空無所空所空既無無無亦無無無既無湛然常寂釋云人亦空法亦空二相本來同且道人法二空畢竟何處住諸境萬緣留不住混然隱在太虗空受想行識恩愛深無始以來墜沉淪翻來覆去娑婆轉滅迹分行串四生胎生駝騾化象馬卵生鳥獸變飛禽濕生水中化蝦蟹化生惡趣作蚊失腳受苦無量劫骨生淚海數如塵四生受苦人難救喚面又生六道中天人道裏曾受福人天道裏做衆生地獄道裏無邊苦餓鬼道裏灌鎔銅畜生道裏諸趣轉修羅道裏做天兵四生六道都轉過地藏閻君發慈心著你做人尋出路再休入我地獄門改惡向善修因果你要成尊我不嗔亦復如是者是還元義既無我則萬法皆無復歸於空便得返本還元也佛家喚作萬法歸一道家喚作復命歸根儒家喚作復還元初天理到這裡言語道斷心行處滅若動念即乖張安排即不是所以川老云退後退後看看頑石動地理會得麼休得胡走動著三十棒甚明白今日才得見如來亦復如是心發眼還得結果見如來知下落理義歸根命清潔得現成真空入大門無為無極道天真安身命妙訣一言透心懷舍利子者是本性當面不識火不能燒水不能溺箭不能傷刀不能割風不能飄日不能炙雨不能灑描畫不出毒藥不能害惡蟲不能螫只因行走路頭差所以失却波羅蜜見舍利子麼亘古到今不曾改變只是來往賃屋居住或時朱樓畫閣或時草舍茅堂或時金釘朱戶或時破廟窰龕省得麼川老云雲起南山雨北山馬名驢字幾多般諸看浩渺無情水幾處隨方幾處圓若要不來不去須得請漏已盡以歸寂滅如此者永出三界外天地不能拘作箇物外間人會麼向前不如退步舍利子凡合聖交合一處聖堅固凡不久形相非長無的實有的虗不肯參詳辜負了如來意不肯參詳念心經每日家巡行數墨遇明師窮理意不由心慌立志氣發勇猛休學頑鈍參透了舍利子徹地通天舍利子法中王千變萬化常放毫光永劫不壞真空無邊舍利子法中王無來無去就是西方無極大道心地堅石也透舍利見前尊佛法親近師不耻下問尋真理訪實義免見閻君是諸法空相者破邪顯正諸法皆空本非實際仙真云法本無法形本非形有形終是假無相是真人金剛經云法尚應捨何況非法又云一切有相皆是虗妄若見諸相非相即見如來從上祖師一味談空者只為衆生直下是空擔負不行起種種假名引導有情無情皆歸空寂得返本源若信未及但去靜坐返照照見五蘊實無所有自然忘形忘體得其人空既得人空如病安去藥其法亦空人法俱空自然休去歇去經云我身本不有憎愛何由生既得忘形忘體有甚念慮可牽到這地面自然放下無仙佛可做無生死可斷無修無證若更有絲毫可修可證則墮生死界永劫受沉淪若能徹底脫灑無所依倚不落有無二邊如虗空獨立直下承當空劫已前圓陀陀光爍爍底有何不可會麼乾坤兩朵海中蓮一切衆生虗出沒是諸法空相非實背了無為認有為外實裏虗揚人德見境生心又更移欺師滅祖續舊情那上儹下趂高的顛倒反復風魔漢滅性言凡著鬼迷終日看方不服藥雜念貪多一肚疵無佛可做才趂心勸人除疑與佛齊各人了得心間事啞叭做夢説不出法身常住無相國妙用在世放光輝不生不滅者理性也此直言直説衆生具足法身真空妙性亘古今不曾生不曾滅不變不移無來無去無舊無新巍巍如是太上云寂兮寥兮獨立而不改周行而不殆又云寂然不動感而遂通四大五蘊恁他虗生虗沒於自己法身總無交涉且道既無交涉如何步步不離古德云和光塵不染三界獨為尊川老又云得優遊處且優遊雲自高飛水自流只見黑風翻大浪未聞沉却釣魚舟如是者且道有交涉也無交涉若得五蘊皆空有甚離與不離會得麼水流常不住青山鎮日間真空一段理無為得自然不生不滅好歡喜上得岸來唱囉哩逍遙路上出了苦海西方路上天堂路上安義大路無極大道極樂家鄉諸佛國裏聖賢地上我今得了真實意宣卷念佛唱囉哩不垢不淨者亦説衆生本來清淨法身佛人凡聖古今僧俗男女生死垢淨增減成敗邪正善惡來去好歹明暗有無東西南北上下裏外這些都不住無名無相無痕無瑕無染無污不長不短不方不圓壞不得燒不得如虗空似蓮華不著水也不垢穢亦不淨潔常劫如然如水中月要見麼隨處放光明幾人能得見若肯信心者晝夜常出現不垢不淨自主張無名無相亮堂堂不住一切無窒礙縱橫自在放神光不垢淨是無為自邊不住不住佛不住人自在縱橫知因人明這句無為大義彈指中忽然惺立命安身不增不減者謂混沌虗空之體迢迢空劫之身如何增得如何減得道云在聖而不餘在凡而不欠釋云如如自然無欠無餘又云經歷劫而不壞至亘古而不遷永嘉云體似虗空沒涯岸上乘菩薩信無疑中下聞之必生怪且道因何如是呵呵自家繩子短倒怨井水深靈山會上曾相識今日因何不認人正是自家昧了不知不覺不增不減無修證知因信心得現成方便不增不減無修證學好信心得現成大德行行孝順進忠賢良公平富貴貧賤僧俗男女老少軍人間忙病人罪人是故空中者説妙道真空不生不滅無垢無淨增不得減不得清淨本然古今不改萬劫常存刀割不斷箭射不穿繩繫不住火燒不燃雨灑不濕日炙不熱推擁不偏擊之不痛捉之難拈因何如是物不礙虗空虗空不礙物也仙真云真空不挂物大道不沾塵川老云虗空不閡絲毫念所以彰名大覺仙是故空中性稟天聖人有道得道歸本元老君釋迦菩薩德道祖師智慧知因有緣有福羅漢參透久遠明心見性無色無受想行識者表説前因也既是空中有甚五蘊積習虗空之體安色不受色安聲不受聲安受不受受安想不受想安行不受行安識不受識六道四生一切假相都無納受清虗妙道纖塵不立畢竟無形行如鳥道坐若太虗且道如何謂之鳥道太虗鳥道雖行而不見迹真空雖露而不見相會麼受想行識五音魔如蠶結繭下湯鍋忙忙只為名和利思心自綱自纏縛父母未生無些事隨著阥阦過愛河一片苦海翻波浪越進越深無底沒左右都是險峻地只為粗行步步錯矣誤仔細離鄉郡無始以來造業多若免輪回不受苦大衆高聲念彌陀若免四生不受罪處心用意念彌陀若免六道生死業行住坐臥念彌陀若免娑婆不來往朝朝每日念彌陀若免閻王生鐵面聞早向善念彌陀無眼耳鼻舌身意者説本性無形相也且道無眼耳鼻舌身意是箇甚麼休得看蹉過了豫今明説有此六根是色身無此六識名法相如此之者只是教修行人眼雖看不要著在色上耳雖聽不要著在聲上鼻雖嗅不要著在香臭上舌雖嘗不要著在味上雖有身體休要著在相上須要忘形忘體意雖應事不要著在境物上要常應常靜道云眼不觀色耳不聽聲舌不貪味鼻不嗅香身不妄動意不狂亂儒云非禮勿視非禮勿聽非禮勿言非禮勿動便是無眼耳鼻口身意也亦是六根清淨便是六塵不染又是六識皆空總而言之十八界靜也又名六耗消亡六賊死一真不動六門關總而言之十八獄空也斷也若此則天堂近也便見本來法身要見本來法身麼在眼曰見在耳曰聞在鼻曰嗅在舌曰談論在手拈掇在足運奔全體起用全體法身非是六根四大見聞知覺休認四大六根為己金剛經云凡所有相皆虗妄道云悟者忘念歸真迷者著相失本盡是假名引導衆生不可知得便了須要親見法身若得親見轉凡成聖若聽人言説或文字上知解如畫餅充飢似説酒止渴終不濟事虗實云華藥欄莫顢頇星在稱不在盤重陽祖師云休教錯認定盤星且道此句如何説謂盤只可等物知輕別重者皆在星上祖師又恐人錯認定盤星討準定盤星定盤星也是死物不知輕重是以休教錯認定盤星一般都是星有用得著底有用不著底此皆喻法精細審察休執著一邊且道此理如何真性與識性真神與識神一般同住止一假一成真道在尋常日用間究察觀想細細參擡手動足全憑道間忙動靜道現前眼觀萬境耳聽聲色鼻聞香臭開言吐語吃飯穿衣千變萬化存心忍耐改惡向善買賣營運看前顧後有道扶持身體健英雄家傑神氣剛道不在時身無主鴛鴦氣斷不中看當時敗壞難留戀五零四散被蛆鑽學道不脫生死苦為人空住在南閻借假修真真常在萬劫無更不論年無色聲香味觸法者本無六塵也皆從一根上起若識的從根本生起處是妄且休認苗仙真云揚湯點沸不如釜底抽薪釋云要伐其樹先去其根枝稍自墜既識根本棄假歸真識得我身非有我身尚無萬法皆空自然清淨觀身無身觀法無法都歸空寂無色聲香味觸法也我心本空罪福無主何者是罪何者是福經云諦觀心本來空是則名為真懺悔且道懺箇甚麼悔箇甚麼懺其前愆悔其後過既得諸根斷何處可生苗無色聲香味觸法打掃潔淨現心華眼不愛色為潔淨從根湧出現心華耳不受聲鼻不嗅香舌不貪味身不觸相意不住法六塵不入無魔境大圓鏡智現心華六門平徹都無了妙觀察智現心華無相家風本現成人人心地發光明豁開自己神通藏受用無窮出世人守真志滿立定根基還元無那移窮理盡性寂滅第一無相家風誰敢受持真空聖境無緣到不得
